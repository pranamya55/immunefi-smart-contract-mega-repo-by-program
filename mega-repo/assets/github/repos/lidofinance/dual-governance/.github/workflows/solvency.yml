name: DualGovernance solvency

permissions:
  contents: read

on:
  workflow_dispatch:

jobs:
  tests:
    name: solvency-simulation
    runs-on: ubuntu-latest
    timeout-minutes: 180

    concurrency:
      group: solvency-simulation-${{ github.ref }}
      cancel-in-progress: true

    env:
      NODE_VERSION: '20.16.0'
      FORGE_VERSION: 'v1.0.0'
      MAINNET_RPC_URL: ${{ secrets.MAINNET_RPC_URL }}
      DEPLOY_ARTIFACT_FILE_NAME: "deploy-artifact-mainnet.toml"

    steps:
      - name: Clone repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup repository
        uses: ./.github/actions/repo-setup

      - name: Run solvency-simulation tests
        shell: bash
        run: npm run test:solvency-simulation -- --load-accounts
        env:
          MAINNET_RPC_URL: ${{ secrets.MAINNET_RPC_URL }}
          DEPLOY_ARTIFACT_FILE_NAME: ${{ env.DEPLOY_ARTIFACT_FILE_NAME }}

name: DualGovernance PR tests

permissions:
  contents: read

on:
  pull_request:
  push:
    branches: [develop, main]
  workflow_dispatch:

env:
  NODE_VERSION: '20.16.0'
  FORGE_VERSION: 'v1.0.0'
  MAINNET_RPC_URL: ${{ secrets.MAINNET_RPC_URL }}
  ANVIL_RPC_URL: http://127.0.0.1:8545
  FUZZ_RUNS: '256'

concurrency:
  group: pr-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    name: unit
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Clone repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install all dependencies
        uses: ./.github/actions/repo-setup

      - name: Run unit tests
        run: npm run test:unit

  regressions_integration:
    name: regressions + integration
    runs-on: ubuntu-latest
    timeout-minutes: 90
    needs: [unit]

    steps:
      - name: Clone repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install all dependencies
        uses: ./.github/actions/repo-setup

      - name: Start anvil fork
        run: |
          nohup anvil \
            --fork-url "$MAINNET_RPC_URL" \
            --port 8545 \
            --chain-id 1 > anvil.log 2>&1 &

          for i in {1..60}; do
            if curl -sS -X POST "$ANVIL_RPC_URL" \
              -H "Content-Type: application/json" \
              -d '{"jsonrpc":"2.0","id":1,"method":"web3_clientVersion","params":[]}'>/dev/null; then
              echo "anvil is up"
              exit 0
            fi
            sleep 1
          done
          echo "anvil did not start"; exit 1

      - name: Download vetoers accounts
        run: node test/regressions/regression-test-utils/download_vetoers.js

      - name: Run regressions + integration in parallel
        shell: bash
        continue-on-error: true
        env:
          MAINNET_RPC_URL: ${{ env.ANVIL_RPC_URL }}
          DEPLOY_ARTIFACT_FILE_NAME: deploy-artifact-mainnet.toml
        run: |
          set -u

          (
            set -o pipefail
            stdbuf -oL -eL npm run test:regressions 2>&1 \
              | tee reg.log \
              | sed -u 's/^/[regressions] /'
            echo "${PIPESTATUS[0]}" > reg.rc
          ) &

          (
            set -o pipefail
            env -u DEPLOY_ARTIFACT_FILE_NAME \
              stdbuf -oL -eL npm run test:integration 2>&1 \
              | tee int.log \
              | sed -u 's/^/[integration] /'
            echo "${PIPESTATUS[0]}" > int.rc
          ) &

          wait

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: test-logs-${{ github.run_id }}
          path: |
            reg.log
            int.log
            anvil.log
            reg.rc
            int.rc
          retention-days: 7

      - name: Show logs summary (tail)
        if: always()
        shell: bash
        run: |
          echo "::group::regressions (last 200 lines)"
          tail -n 200 reg.log || true
          echo "::endgroup::"
          echo "::group::integration (last 200 lines)"
          tail -n 200 int.log || true
          echo "::endgroup::"

      - name: Fail if any suite failed
        shell: bash
        run: |
          RC_REG=$(cat reg.rc 2>/dev/null || echo 1)
          RC_INT=$(cat int.rc 2>/dev/null || echo 1)
          echo "regressions RC=$RC_REG, integration RC=$RC_INT" >> "$GITHUB_STEP_SUMMARY"
          if [ "$RC_REG" -ne 0 ] || [ "$RC_INT" -ne 0 ]; then
            echo "At least one suite failed."
            exit 1
          fi

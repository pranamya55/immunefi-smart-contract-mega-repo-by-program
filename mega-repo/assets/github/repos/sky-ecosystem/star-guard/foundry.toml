[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.24"
optimizer = false
optimizer_runs = 200
verbosity = 1
via_ir = false

[rpc_endpoints]
mainnet = "${MAINNET_RPC_URL}"

[etherscan]
mainnet = { key = "${ETHERSCAN_API_KEY}", chain = 1 }

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      api: ${{ steps.filter.outputs.api }}
      app: ${{ steps.filter.outputs.app }}
      sdk: ${{ steps.filter.outputs.sdk }}
      protocol: ${{ steps.filter.outputs.protocol }}
      relayer: ${{ steps.filter.outputs.relayer }}
      ui: ${{ steps.filter.outputs.ui }}
      market-keeper: ${{ steps.filter.outputs.market-keeper }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api:
              - 'packages/api/**'
              - 'packages/sdk/**'
              - 'pnpm-lock.yaml'
            app:
              - 'packages/app/**'
              - 'packages/sdk/**'
              - 'packages/ui/**'
              - 'pnpm-lock.yaml'
            sdk:
              - 'packages/sdk/**'
              - 'pnpm-lock.yaml'
            protocol:
              - 'packages/protocol/**'
            relayer:
              - 'packages/relayer/**'
              - 'packages/sdk/**'
              - 'pnpm-lock.yaml'
            ui:
              - 'packages/ui/**'
            market-keeper:
              - 'packages/market-keeper/**'
              - 'packages/sdk/**'
              - 'pnpm-lock.yaml'

  test-api:
    needs: changes
    if: needs.changes.outputs.api == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - uses: pnpm/action-setup@v4
      - name: Get pnpm store
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV
      - uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-
      - run: pnpm install
      - run: pnpm --filter @sapience/sdk run build:lib
      - run: pnpm --filter @sapience/api run generate-types
      - name: Verify generated files are up to date
        run: git diff --exit-code packages/api/schema.graphql packages/sdk/types/graphql.ts
      - run: pnpm --filter @sapience/api run compile
      - run: pnpm --filter @sapience/api run test -- --run

  lint-api:
    needs: changes
    if: needs.changes.outputs.api == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - uses: pnpm/action-setup@v4
      - name: Get pnpm store
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV
      - uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-
      - run: pnpm install
      - run: pnpm --filter @sapience/sdk run build:lib
      - run: pnpm --filter @sapience/api run prisma:generate
      - run: pnpm --filter @sapience/api run lint
      - run: pnpm --filter @sapience/api run type-check

  lint-typecheck-app:
    needs: changes
    if: needs.changes.outputs.app == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - uses: pnpm/action-setup@v4
      - name: Get pnpm store
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV
      - uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-
      - run: pnpm install
      - run: pnpm --filter @sapience/sdk run build:lib
      - run: pnpm --filter app run lint
      - run: pnpm --filter app run type-check

  test-app:
    needs: changes
    if: needs.changes.outputs.app == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - uses: pnpm/action-setup@v4
      - name: Get pnpm store
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV
      - uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-
      - run: pnpm install
      - run: pnpm --filter @sapience/sdk run build:lib
      - run: pnpm --filter app test

  lint-typecheck-sdk:
    needs: changes
    if: needs.changes.outputs.sdk == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - uses: pnpm/action-setup@v4
      - name: Get pnpm store
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV
      - uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-
      - run: pnpm install
      - run: pnpm --filter @sapience/sdk run build:lib
      - run: pnpm --filter @sapience/sdk run lint
      - run: pnpm --filter @sapience/sdk run type-check

  lint-typecheck-ui:
    needs: changes
    if: needs.changes.outputs.ui == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - uses: pnpm/action-setup@v4
      - name: Get pnpm store
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV
      - uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-
      - run: pnpm install
      - run: pnpm --filter ui run lint
      - run: pnpm --filter ui run type-check

  lint-typecheck-relayer:
    needs: changes
    if: needs.changes.outputs.relayer == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - uses: pnpm/action-setup@v4
      - name: Get pnpm store
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV
      - uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-
      - run: pnpm install
      - run: pnpm --filter @sapience/sdk run build:lib
      - run: pnpm --filter @sapience/relayer run lint
      - run: pnpm --filter @sapience/relayer run type-check

  test-sdk:
    needs: changes
    if: needs.changes.outputs.sdk == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - uses: pnpm/action-setup@v4
      - name: Get pnpm store
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV
      - uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-
      - run: pnpm install
      - run: pnpm --filter @sapience/sdk run build:lib
      - run: pnpm --filter @sapience/sdk run test

  test-relayer:
    needs: changes
    if: needs.changes.outputs.relayer == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - uses: pnpm/action-setup@v4
      - name: Get pnpm store
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV
      - uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-
      - run: pnpm install
      - run: pnpm --filter @sapience/sdk run build:lib
      - run: pnpm --filter @sapience/relayer run test

  test-protocol:
    needs: changes
    if: needs.changes.outputs.protocol == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive }
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - uses: pnpm/action-setup@v4
      - uses: foundry-rs/foundry-toolchain@v1
        with:
          cache: true
      - run: pnpm install
      - run: forge fmt --check
        working-directory: packages/protocol
      - run: pnpm --filter protocol run test

  test-market-keeper:
    needs: changes
    if: needs.changes.outputs.market-keeper == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - uses: pnpm/action-setup@v4
      - name: Get pnpm store
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV
      - uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-
      - run: pnpm install
      - run: pnpm --filter @sapience/sdk run build:lib
      - run: pnpm --filter @sapience/market-keeper run test
        env:
          POLYGON_RPC_URL: ${{ secrets.POLYGON_RPC_URL }}

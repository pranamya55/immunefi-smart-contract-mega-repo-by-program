# Minimal 2-node P2P test: sequencer + fullnode with --dummy-ol-client.
# No strata or bitcoind needed. Verifies gossip handshake works.
#
# Usage:
#   docker compose --env-file .env.alpen -f docker-compose-p2p-test.yml up

services:

  alpen-client:
    image: alpen-client:latest
    container_name: alpen_p2p_seq
    command:
      - --sequencer-pubkey
      - ${SEQUENCER_PUBKEY}
      - --dummy-ol-client
      - --custom-chain
      - ${CHAIN_SPEC:-testnet}
      - --datadir
      - /app/data
      - --p2p-secret-key
      - /app/keys/seq-p2p.hex
      - --addr
      - "0.0.0.0"
      - --port
      - "30303"
      - --nat
      - none
      - --disable-discovery
      - --http
      - --http.addr
      - "0.0.0.0"
      - --http.port
      - "8545"
      - --http.api
      - eth,net,web3,txpool,admin,debug
      - --color
      - never
    environment:
      RUST_LOG: info,alpen_gossip=debug
    ports:
      - "8545:8545"
      - "30303:30303"
    volumes:
      - ./configs/generated/seq-p2p.hex:/app/keys/seq-p2p.hex:ro
    entrypoint: ["/usr/local/bin/entrypoint.sh"]
    networks:
      - p2p_test

  alpen-client-fullnode:
    image: alpen-client:latest
    container_name: alpen_p2p_fn
    depends_on:
      - alpen-client
    command:
      - --sequencer-pubkey
      - ${SEQUENCER_PUBKEY}
      - --dummy-ol-client
      - --custom-chain
      - ${CHAIN_SPEC:-testnet}
      - --datadir
      - /app/data
      - --sequencer-http
      - http://alpen-client:8545
      - --p2p-secret-key
      - /app/keys/fn-p2p.hex
      - --addr
      - "0.0.0.0"
      - --port
      - "30303"
      - --nat
      - none
      - --disable-discovery
      - --trusted-peers
      - enode://${SEQ_P2P_PUBKEY}@alpen-client:30303
      - --http
      - --http.addr
      - "0.0.0.0"
      - --http.port
      - "8545"
      - --http.api
      - eth,net,web3,txpool,admin,debug
      - --color
      - never
    environment:
      RUST_LOG: info,alpen_gossip=debug
    ports:
      - "9545:8545"
      - "31303:30303"
    volumes:
      - ./configs/generated/fn-p2p.hex:/app/keys/fn-p2p.hex:ro
    entrypoint: ["/usr/local/bin/entrypoint.sh"]
    networks:
      - p2p_test

networks:
  p2p_test:
    driver: bridge

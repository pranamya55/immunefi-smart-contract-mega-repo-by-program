name: Functional tests

on:
  workflow_call:

env:
  CARGO_TERM_COLOR: always

permissions: {}

jobs:
  extract-rust-version:
    name: Extract toolchain version
    runs-on: ubuntu-latest
    outputs:
      nightly-version: ${{ steps.extract-version.outputs.nightly-version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Extract Rust version
        id: extract-version
        uses: ./.github/actions/extract-rust-version

  lint:
    name: Lint functional test files
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@eac588ad8def6316056a12d4907a9d4d84ff7a3b # v7.3.0
        with:
          working-directory: functional-tests
          activate-environment: true
          enable-cache: true
          cache-suffix: "functional-tests"
          python-version: "3.12"

      - name: Check formatting
        working-directory: functional-tests
        run: uv run ruff format --check

      - name: Check types
        working-directory: functional-tests
        run: uv run ty check

      - name: Lint
        working-directory: functional-tests
        run: uv run ruff check

  run:
    name: Run functional tests and generate report
    runs-on: ubuntu-latest
    needs: extract-rust-version
    timeout-minutes: 60
    env:
      OPENSSL_VERSION: "3.5.0"
      OPENSSL_CACHE_VERSION: "v2" # update this to refresh cache
      OPENSSL_INSTALL_DIR: ${{ github.workspace }}/.cache/openssl-3.5.0

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Restore cached OpenSSL build
        id: cache-openssl
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: ${{ env.OPENSSL_INSTALL_DIR }}
          key: ${{ runner.os }}-openssl-${{ env.OPENSSL_VERSION }}-${{ env.OPENSSL_CACHE_VERSION }}

      - name: Download and build OpenSSL
        if: steps.cache-openssl.outputs.cache-hit != 'true'
        run: |
          curl -fsSLO "https://www.openssl.org/source/openssl-$OPENSSL_VERSION.tar.gz"
          tar -xzf "openssl-$OPENSSL_VERSION.tar.gz"
          cd "openssl-$OPENSSL_VERSION"
          ./config --prefix="$OPENSSL_INSTALL_DIR" --openssldir="$OPENSSL_INSTALL_DIR"
          make -j"$(nproc)"
          make install_sw install_ssldirs

      - name: Configure OpenSSL environment
        run: |
          OPENSSL_LIB_DIR="$OPENSSL_INSTALL_DIR/lib64"
          if [ ! -d "$OPENSSL_LIB_DIR" ]; then
            OPENSSL_LIB_DIR="$OPENSSL_INSTALL_DIR/lib"
          fi
          {
            echo "OPENSSL_ROOT_DIR=$OPENSSL_INSTALL_DIR"
            echo "OPENSSL_DIR=$OPENSSL_INSTALL_DIR"
            echo "PKG_CONFIG_PATH=$OPENSSL_LIB_DIR/pkgconfig${PKG_CONFIG_PATH:+:$PKG_CONFIG_PATH}"
            echo "LD_LIBRARY_PATH=$OPENSSL_LIB_DIR${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}"
          } >> "$GITHUB_ENV"
          echo "$OPENSSL_INSTALL_DIR/bin" >> "$GITHUB_PATH"

      - name: Cleanup space
        uses: ./.github/actions/cleanup # zizmor: ignore[unpinned-uses]

      - name: Install bitcoind
        env:
          BITCOIND_VERSION: "30.2"
          BITCOIND_ARCH: "x86_64-linux-gnu"
        run: |
          curl -fsSLO --proto "=https" --tlsv1.2 "https://bitcoincore.org/bin/bitcoin-core-$BITCOIND_VERSION/bitcoin-$BITCOIND_VERSION-$BITCOIND_ARCH.tar.gz"
          curl -fsSLO --proto "=https" --tlsv1.2 "https://bitcoincore.org/bin/bitcoin-core-$BITCOIND_VERSION/SHA256SUMS"
          sha256sum --ignore-missing --check SHA256SUMS
          tar xzf "bitcoin-$BITCOIND_VERSION-$BITCOIND_ARCH.tar.gz"
          sudo install -m 0755 -t /usr/local/bin "bitcoin-$BITCOIND_VERSION"/bin/*
          bitcoind --version
          rm -rf SHA256SUMS "bitcoin-$BITCOIND_VERSION" "bitcoin-$BITCOIND_VERSION-$BITCOIND_ARCH.tar.gz"

      - name: Install Rust toolchain
        env:
          RUST_NIGHTLY: ${{ needs.extract-rust-version.outputs.nightly-version }}
        run: |
          rustup toolchain install "$RUST_NIGHTLY" --profile minimal --component llvm-tools-preview
          rustup default "$RUST_NIGHTLY"

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@81ecf985428d5c2ea81dbf079bceca32bc9604ab # v2.62.43
        with:
          tool: cargo-llvm-cov

      - name: Rust cache
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2
        with:
          cache-on-failure: true

      - name: Install uv
        uses: astral-sh/setup-uv@eac588ad8def6316056a12d4907a9d4d84ff7a3b # v7.3.0
        with:
          working-directory: functional-tests
          activate-environment: true
          enable-cache: true
          cache-suffix: "functional-tests"

      - name: Install libclang for bindgen
        run: |
          sudo apt-get update
          sudo apt-get install -y libclang-dev

      - name: Setup FoundationDB client
        uses: ./.github/actions/setup-foundationdb

      - name: Setup FoundationDB server
        uses: ./.github/actions/setup-foundationdb-server

      - name: Build Cargo project
        run: |
          COV_TARGET_DIR="$GITHUB_WORKSPACE/target/llvm-cov-target"
          RUSTFLAGS="-Cinstrument-coverage" cargo build --locked --bin strata-bridge --target-dir "$COV_TARGET_DIR"
          RUSTFLAGS="-Cinstrument-coverage" cargo build --locked -p secret-service --bin secret-service --target-dir "$COV_TARGET_DIR"
          RUSTFLAGS="-Cinstrument-coverage" cargo build --locked --bin strata-asm-runner --target-dir "$COV_TARGET_DIR"
          cargo build --locked --bin dev-cli --target-dir "$COV_TARGET_DIR"

      - name: Run functional tests
        id: funcTestsRun
        continue-on-error: true
        env:
          NO_COLOR: "1"
          LOG_LEVEL: "info"
          PYTHON_VERSION: "3.12" # NOTE: (@Rajil1213) build fails with 3.13 since bitcoinlib (>=0.7.5,<0.8) uses an old version of numpy
          shell: bash
        run: |
          export LLVM_PROFILE_FILE="$GITHUB_WORKSPACE/target/llvm-cov-target/strata-%p-%m.profraw"
          NEWPATH="$GITHUB_WORKSPACE/target/llvm-cov-target/debug"
          export PATH="$NEWPATH:$PATH"
          echo "$PATH"
          echo "Making sure built binaries are available"
          which strata-bridge
          which secret-service
          which dev-cli
          cd functional-tests
          source ./env.bash
          uv run --python "$PYTHON_VERSION" python entry.py

      - name: Generate combined coverage lcov
        id: genFunctionalLcov
        continue-on-error: true
        run: |
          # cargo-llvm-cov expects default target dir and adds llvm-cov-target itself
          export CARGO_TARGET_DIR="$GITHUB_WORKSPACE/target"
          export LLVM_PROFILE_FILE="$GITHUB_WORKSPACE/target/llvm-cov-target/strata-%p-%m.profraw"
          cargo llvm-cov report --lcov > lcov.functional.info
      - name: Upload coverage lcov artifact
        if: steps.genFunctionalLcov.outcome == 'success'
        continue-on-error: true
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: functional-lcov
          path: lcov.functional.info

      - name: Zip log files on failure
        if: steps.funcTestsRun.outcome == 'failure'
        # Create a zip archive (logs.zip) that includes only service.log files,
        # preserving the folder structure starting from functional-tests/_dd
        # NOTE: (MdTeach) Entire _dd could end up hundreds of MBs, so keep only logs
        run: |
          # service logs
          find functional-tests/_dd -type f -name "service.log" | zip -@ logs.zip
          # functional test logs
          zip -r logs.zip functional-tests/_dd -i '*/logs/*.log'

      - name: Upload logs as build artifact on failure
        if: steps.funcTestsRun.outcome == 'failure'
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: fntest_dd
          path: logs.zip
          retention-days: 30
          if-no-files-found: error
          compression-level: 0 # already compressed

      - name: Fail job if functional tests fail
        if: steps.funcTestsRun.outcome == 'failure'
        run: |
          echo "Functional tests failed"
          exit 1

  functional-tests-success:
    name: Check that all checks pass
    runs-on: ubuntu-latest
    if: always()
    needs: [lint, run]
    timeout-minutes: 60
    steps:
      - name: Decide whether the needed jobs succeeded or failed
        uses: re-actors/alls-green@05ac9388f0aebcb5727afa17fcccfecd6f8ec5fe # release/v1
        with:
          jobs: ${{ toJSON(needs) }}

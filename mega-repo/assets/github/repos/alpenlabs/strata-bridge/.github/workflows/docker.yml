name: Docker

on:
  merge_group:
  push:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

permissions: {}

jobs:
  extract-rust-version:
    name: Extract toolchain version
    runs-on: ubuntu-latest
    outputs:
      nightly-version: ${{ steps.extract-version.outputs.nightly-version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Extract Rust version
        id: extract-version
        uses: ./.github/actions/extract-rust-version

  docker-build:
    name: Test Docker builds
    runs-on: ubuntu-latest
    needs: extract-rust-version
    timeout-minutes: 150 # 2.5h hours is enough for most builds
    env:
      DATABASE_URL: sqlite://./operator.db
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Cleanup space
        uses: ./.github/actions/cleanup # zizmor: ignore[unpinned-uses]

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Install Rust toolchain
        env:
          RUST_NIGHTLY: ${{ needs.extract-rust-version.outputs.nightly-version }}
        run: |
          rustup toolchain install "$RUST_NIGHTLY" --profile minimal
          rustup default "$RUST_NIGHTLY"

      - name: Rust cache
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2
        with:
          cache-on-failure: true

      - name: Install FoundationDB
        uses: ./.github/actions/setup-foundationdb # zizmor: ignore[unpinned-uses]

      - name: Cache Docker layers
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Build base image
        run: |
          docker buildx build \
            --file docker/base.Dockerfile \
            --tag bridge-base:latest \
            --cache-from type=local,src=/tmp/.buildx-cache \
            --cache-to type=local,dest=/tmp/.buildx-cache-new,mode=max \
            --load \
            .
          docker save bridge-base:latest -o /tmp/bridge-base.tar

      - name: Build rt image
        run: |
          docker buildx build \
            --file docker/rt.Dockerfile \
            --tag bridge-rt:latest \
            --cache-from type=local,src=/tmp/.buildx-cache \
            --cache-to type=local,dest=/tmp/.buildx-cache-new,mode=max \
            --load \
            .
          docker save bridge-rt:latest -o /tmp/bridge-rt.tar

      - name: Build strata-bridge image
        run: |
          docker load -i /tmp/bridge-base.tar
          docker load -i /tmp/bridge-rt.tar
          docker build \
            --file docker/strata-bridge/Dockerfile \
            --tag strata-bridge:latest \
            .

      - name: Build secret-service image
        run: |
          docker load -i /tmp/bridge-base.tar
          docker load -i /tmp/bridge-rt.tar
          docker build \
            --file docker/secret-service/Dockerfile \
            --tag secret-service:latest \
            .

      - name: Build asm-runner image
        run: |
          docker load -i /tmp/bridge-base.tar
          docker load -i /tmp/bridge-rt.tar
          docker build \
            --file docker/asm-runner/Dockerfile \
            --tag strata-asm-runner:latest \
            .

      - name: Move cache
        run: |
          # Move cache to avoid ever-growing cache
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

version: "3"

tasks:
  default:
    desc: "Run Go lint checks"
    cmds:
      - golangci-lint run --new-from-rev=origin/develop --path-mode=abs

  fix:
    desc: "Fix Go lint issues"
    cmds:
      - |
        echo "Fixing Go lint issues..."
        gofmt -s -w .
        golangci-lint run --fix --new-from-rev=origin/develop --path-mode=abs

dir: "{{ .InterfaceDir }}/mocks"
mockname: "{{ .InterfaceName }}"
outpkg: mocks
filename: "{{ .InterfaceName | snakecase }}.go"
packages:
  github.com/smartcontractkit/chainlink-solana/pkg/monitoring:
    interfaces:
      ChainReader:
  github.com/smartcontractkit/chainlink-solana/pkg/monitoring/metrics:
    interfaces:
      FeedBalances:
      Fees:
        config:
          filename: "Fees.go"
      NetworkFees:
      NodeBalances:
      NodeSuccess:
      ReportObservations:
      SlotHeight:
  github.com/smartcontractkit/chainlink-solana/pkg/solana:
    interfaces:
      Chain:
  github.com/smartcontractkit/chainlink-solana/pkg/solana/client:
    interfaces:
      ReaderWriter:
  github.com/smartcontractkit/chainlink-solana/pkg/solana/config:
    interfaces:
      Config:
        config:
          filename: config.go
          case: underscore
  github.com/smartcontractkit/chainlink-solana/pkg/solana/fees:
    interfaces:
      Estimator:
        config:
          filename: "Estimator.go"
  github.com/smartcontractkit/chainlink-solana/pkg/solana/txm:
    interfaces:
      TxManager:
  github.com/smartcontractkit/chainlink-common/pkg/types/core:
    interfaces:
      Keystore:
        config:
          dir: "pkg/solana/txm/mocks"
          filename: simple_keystore.go
          case: underscore
          mockname: SimpleKeystore
  github.com/smartcontractkit/chainlink-solana/pkg/solana/logpoller:
    interfaces:
      RPCClient:
      WorkerGroup:
      filtersI:
        config:
          dir: "pkg/solana/logpoller/mocks"
          filename: mock_filters.go
          mockname: MockFilters
      logsLoader:
        config:
          dir: "pkg/solana/logpoller/mocks"
          filename: mock_logs_loader.go
          mockname: MockLogsLoader
      ORM:
        config:
          dir: "pkg/solana/logpoller/mocks"
          filename: mock_orm.go
          mockname: MockORM
  github.com/smartcontractkit/chainlink-solana/pkg/solana/chainreader:
    interfaces:
      EventsReader:
  github.com/smartcontractkit/chainlink-common/pkg/types/ccipocr3:
    config:
      dir: pkg/solana/ccip/codec/mocks
    interfaces:
      SourceChainExtraDataCodec:

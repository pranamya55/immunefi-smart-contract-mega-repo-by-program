name: e2e_tests_custom_cl_reusable

on:
  workflow_call:
    inputs:
      solana_ref:
        required: true
        type: string
        description: "The chainlink-solana ref to checkout"
      tests_ref:
        required: false
        type: string
        description: "The chainlink-solana ref to checkout for test harness code; defaults to solana_ref"
      ecr_repository:
        required: true
        type: string
        description: "AWS ECR repository name (AWS ECR only)"
      image_tag:
        required: true
        type: string
        description: "AWS ECR image tag (AWS ECR only)"
    secrets:
      aws_account_id:
        required: true
        description: "AWS account ID for ECR (AWS ECR only)"
      aws_region:
        required: true
        description: "AWS region for ECR (AWS ECR only)"
      aws_role_to_assume:
        required: true
        description: "AWS role to assume for ECR auth (AWS ECR only)"

env:
  CONTRACT_ARTIFACTS_PATH: contracts/target/deploy
  MOD_CACHE_VERSION: 1

concurrency:
  group: integration-tests-solana-reusable-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check_test_compilation:
    name: Check integration test compilation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4
        with:
          repository: smartcontractkit/chainlink-solana
          ref: ${{ inputs.tests_ref || inputs.solana_ref }}
      - name: Setup go
        uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"
          check-latest: true
          cache: true
      - run: cd ./integration-tests && go test -run=xxx ./...

  get_projectserum_version:
    name: Get ProjectSerum Version
    environment: integration
    runs-on: ubuntu-latest
    outputs:
      projectserum_version: ${{ steps.psversion.outputs.projectserum_version }}
    steps:
      - name: Checkout the repo
        uses: actions/checkout@v4
        with:
          repository: smartcontractkit/chainlink-solana
          ref: ${{ inputs.solana_ref }}
      - name: Get ProjectSerum Version
        id: psversion
        uses: ./.github/actions/projectserum_version

  e2e_custom_build_artifacts:
    name: E2E Custom Build Artifacts
    environment: integration
    permissions:
      id-token: write
      contents: read
    runs-on: ubuntu-latest-32cores-128GB
    needs: [get_projectserum_version]
    steps:
      - name: Checkout the repo
        uses: actions/checkout@v4
        with:
          repository: smartcontractkit/chainlink-solana
          ref: ${{ inputs.solana_ref }}
      - name: Build contracts
        uses: ./.github/actions/build_contract_artifacts
        with:
          runner-os: ${{ runner.os }}
          image: backpackapp/build
          image-version: ${{ needs.get_projectserum_version.outputs.projectserum_version }}

  e2e_custom_run_smoke_tests_matrix:
    name: E2E Smoke Tests (${{ matrix.variant }})
    environment: integration
    permissions:
      id-token: write
      contents: read
    runs-on: ubuntu-latest-16cores-64GB # ghv-ignore!
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: embedded
            configs: env.toml,products/solana/basic.toml
          - variant: plugins
            configs: env.toml,products/solana/basic.toml,products/solana/plugins.toml
    needs: [e2e_custom_build_artifacts, check_test_compilation]
    env:
      CHAINLINK_IMAGE: ${{ format('{0}.dkr.ecr.{1}.amazonaws.com/{2}:{3}', secrets.aws_account_id, secrets.aws_region, inputs.ecr_repository, inputs.image_tag) }}
    steps:
      - name: Checkout the repo
        uses: actions/checkout@v4
        with:
          repository: smartcontractkit/chainlink-solana
          ref: ${{ inputs.tests_ref || inputs.solana_ref }}

      - name: Install Solana CLI
        run: ./scripts/install-solana-ci.sh

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@010d0da01d0b5a38af31e9c3470dbfdabdecca3a # v4.0.1
        with:
          aws-region: ${{ secrets.aws_region }}
          role-to-assume: ${{ secrets.aws_role_to_assume }}
          role-duration-seconds: 1800
          mask-aws-account-id: true

      - name: Authenticate to ECR
        uses: aws-actions/amazon-ecr-login@062b18b96a7aff071d4dc91bc00c4c1a7945b076 # v2.0.1
        with:
          registries: ${{ secrets.aws_account_id }}
        env:
          AWS_REGION: ${{ secrets.aws_region }}

      - name: Install gauntlet
        uses: ./.github/actions/build-gauntlet

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: integration-tests/go.mod
          cache: true
          cache-dependency-path: integration-tests/go.sum

      - name: Download Go dependencies
        working-directory: integration-tests
        run: go mod download

      - name: Download contract artifacts
        uses: actions/download-artifact@v4
        with:
          name: artifacts
          path: ${{ env.CONTRACT_ARTIFACTS_PATH }}

      - name: Start fakes server
        working-directory: integration-tests/devenv
        run: |
          go build -o /tmp/fakes-server ./fakes/cmd
          /tmp/fakes-server &
          for _ in {1..20}; do
            if curl -fsS -X POST "http://127.0.0.1:9111/mockserver-bridge" > /dev/null; then
              echo "Fakes server is ready"
              exit 0
            fi
            sleep 1
          done
          echo "Fakes server failed to start"
          exit 1

      - name: Setup Environment
        working-directory: integration-tests/devenv
        env:
          CONFIG: ${{ matrix.configs }}
        run: go run ./cmd u "$CONFIG"

      - name: Run Smoke Test
        working-directory: integration-tests/tests
        run: go test -v -timeout 30m -run TestSolanaOCRV2Smoke

      - name: Show Docker containers status
        if: failure()
        run: docker ps -a

      - name: Upload Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-logs-${{ matrix.variant }}
          path: |
            integration-tests/devenv/logs/
            integration-tests/tests/logs/
          retention-days: 1

  e2e_custom_run_smoke_tests:
    name: E2E Custom Run Smoke Tests
    runs-on: ubuntu-latest
    needs: [e2e_custom_run_smoke_tests_matrix]
    if: always()
    steps:
      - name: Check results
        env:
          MATRIX_RESULT: ${{ needs.e2e_custom_run_smoke_tests_matrix.result }}
        run: |
          if [[ "${MATRIX_RESULT}" == "success" ]]; then
            echo "All smoke tests passed."
          else
            echo "Smoke tests failed: ${MATRIX_RESULT}"
            exit 1
          fi

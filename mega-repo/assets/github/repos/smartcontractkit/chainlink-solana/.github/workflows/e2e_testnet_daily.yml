name: e2e_testnet_daily
on:
  workflow_dispatch:
    inputs:
      cl_branch_ref:
        description: Chainlink repo branch to integrate with
        required: true
        default: develop
        type: string

  schedule:
    - cron: '0 6 * * *'
# Only run 1 of this workflow at a time per PR
env:
  CONTRACT_ARTIFACTS_PATH: contracts/target/deploy
  MOD_CACHE_VERSION: 1

# Only run 1 of this workflow at a time per PR
concurrency:
  group: integration-tests-solana-daily-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check_test_compilation:
    name: Check integration test compilation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4
      - name: Setup go
        uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"
          check-latest: true
          cache: true
      - run: cd ./integration-tests && go test -run=xxx ./...

  get_projectserum_version:
    name: Get ProjectSerum Version
    environment: integration
    runs-on: ubuntu-latest
    outputs:
      projectserum_version: ${{ steps.psversion.outputs.projectserum_version }}
    steps:
      - name: Checkout the repo
        uses: actions/checkout@v4
      - name: Get ProjectSerum Version
        id: psversion
        uses: ./.github/actions/projectserum_version

  e2e_custom_build_artifacts:
    name: E2E Custom Build Artifacts
    environment: integration
    permissions:
      id-token: write
      contents: read
    runs-on: ubuntu-latest-32cores-128GB # ghv-ignore!
    needs: [get_projectserum_version]
    steps:
      - name: Checkout the repo
        uses: actions/checkout@v4
      - name: Build contracts
        uses: ./.github/actions/build_contract_artifacts
        with:
          runner-os: ${{ runner.os }}
          image: backpackapp/build
          image-version: ${{ needs.get_projectserum_version.outputs.projectserum_version }}

  e2e_custom_build_custom_chainlink_image:
    name: E2E Custom Build Custom CL Image
    runs-on: ubuntu-latest
    environment: integration
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Check if image exists in ECR
        id: check-image-exists
        uses: smartcontractkit/.github/actions/ecr-image-exists@ecr-image-exists/0.0.1
        with:
          repository: "chainlink"
          tag: solana.${{ github.sha }}
          aws-role-arn: ${{ secrets.QA_AWS_ROLE_TO_ASSUME }}

      - name: Checkout Chainlink repo
        if: ${{ steps.check-image-exists.outputs.exists != 'true' }}
        uses: actions/checkout@v4
        with:
          repository: smartcontractkit/chainlink
          ref: ${{ github.event.inputs.cl_branch_ref }}

      - name: Build Image
        if: ${{ steps.check-image-exists.outputs.exists != 'true' }}
        uses: smartcontractkit/.github/actions/ctf-build-image@ctf-build-image/v1
        env:
          # otherwise image building will fail, because pipeline doesn't have access to private repositories (could be fixed with GATI)
          CL_INSTALL_PRIVATE_PLUGINS: "false"
        with:
          dockerfile: core/chainlink.Dockerfile
          image-tag: solana.${{ github.sha }}
          go-get-overrides: |
            chainlink-solana=${{ github.event.pull_request.head.sha }}
          # registry inputs
          aws-role-arn: ${{ secrets.QA_AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ secrets.QA_AWS_REGION }}
          aws-account-number: ${{ secrets.QA_AWS_ACCOUNT_NUMBER }}
          docker-registry-url: ${{ secrets.QA_AWS_ACCOUNT_NUMBER }}.dkr.ecr.${{ secrets.QA_AWS_REGION }}.amazonaws.com
          docker-repository-name: chainlink
          # GATI inputs
          gati-role-arn: ${{ secrets.AWS_ROLE_ARN_GATI_READONLY }}
          gati-lambda-url: ${{ secrets.AWS_RELENG_TEAM_GATI_LAMBDA_URL}}

  e2e_custom_run_smoke_tests:
    name: E2E Smoke Tests (${{ matrix.variant }})
    environment: integration
    permissions:
      id-token: write
      contents: read
    runs-on: ubuntu-latest-16cores-64GB # ghv-ignore!
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: embedded
            configs: env-testnet.toml,products/solana/basic.toml
          - variant: plugins
            configs: env-testnet.toml,products/solana/basic.toml,products/solana/plugins.toml
    needs: [e2e_custom_build_artifacts, e2e_custom_build_custom_chainlink_image, check_test_compilation]
    env:
      CHAINLINK_IMAGE: ${{ format('{0}.dkr.ecr.{1}.amazonaws.com/chainlink:solana.{2}', secrets.QA_AWS_ACCOUNT_NUMBER, secrets.QA_AWS_REGION, github.sha) }}
      SOLANA_PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
    steps:
      - name: Checkout the repo
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@010d0da01d0b5a38af31e9c3470dbfdabdecca3a # v4.0.1
        with:
          aws-region: ${{ secrets.QA_AWS_REGION }}
          role-to-assume: ${{ secrets.QA_AWS_ROLE_TO_ASSUME }}
          role-duration-seconds: 1800
          mask-aws-account-id: true

      - name: Authenticate to ECR
        uses: aws-actions/amazon-ecr-login@062b18b96a7aff071d4dc91bc00c4c1a7945b076 # v2.0.1
        with:
          registries: ${{ secrets.QA_AWS_ACCOUNT_NUMBER }}
        env:
          AWS_REGION: ${{ secrets.QA_AWS_REGION }}

      - name: Install Solana CLI
        run: ./scripts/install-solana-ci.sh

      - name: Install gauntlet
        uses: ./.github/actions/build-gauntlet

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: integration-tests/go.mod
          cache: true
          cache-dependency-path: integration-tests/go.sum

      - name: Download Go dependencies
        working-directory: integration-tests
        run: go mod download

      - name: Download contract artifacts
        uses: actions/download-artifact@v4
        with:
          name: artifacts
          path: ${{ env.CONTRACT_ARTIFACTS_PATH }}

      - name: Start fakes server
        working-directory: integration-tests/devenv
        run: |
          go build -o /tmp/fakes-server ./fakes/cmd
          /tmp/fakes-server &
          for _ in {1..20}; do
            if curl -fsS -X POST "http://127.0.0.1:9111/mockserver-bridge" > /dev/null; then
              echo "Fakes server is ready"
              exit 0
            fi
            sleep 1
          done
          echo "Fakes server failed to start"
          exit 1

      - name: Setup Environment
        working-directory: integration-tests/devenv
        run: go run ./cmd u ${{ matrix.configs }}

      - name: Run Smoke Test
        working-directory: integration-tests/tests
        run: go test -v -timeout 30m -run TestSolanaOCRV2Smoke

      - name: Show Docker containers status
        if: failure()
        run: docker ps -a

      - name: Upload Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-logs-${{ matrix.variant }}
          path: |
            integration-tests/devenv/logs/
            integration-tests/tests/logs/
          retention-days: 1

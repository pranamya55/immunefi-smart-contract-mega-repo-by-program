name: CCIP Integration Test

on:
  push:
    branches:
      - develop
      - main
  pull_request:
    # edited is not one of the default events, re-run incase the core-ref was modified
    # in the PR body
    types: [opened, synchronize, reopened, edited]

concurrency:
  group: ccip-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ccip_test_evm2aptos:
    name: Run EVM2Aptos Test
    runs-on: ubuntu-latest
    env:
      DEFAULT_CORE_REF: develop
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Free up disk space
        uses: smartcontractkit/.github/actions/free-disk-space@free-disk-space/v1

      - name: Get core ref from PR body
        if: github.event_name == 'pull_request'
        run: |
          comment=$(gh pr view https://github.com/${{ github.repository }}/pull/${{ github.event.pull_request.number }} --json body -q '.body')
          core_ref=$(echo $comment | grep -oP 'core ref: \K\S+' || true)
          if [ ! -z "$core_ref" ]; then
            echo "CUSTOM_CORE_REF=${core_ref}" >> "${GITHUB_ENV}"
          fi

      - name: Install Aptos CLI
        uses: aptos-labs/actions/install-aptos-cli@ce57287eb852b9819c1d74fecc3be187677559fd # v0.1
        with:
          CLI_VERSION: 8.1.0

      - name: Checkout chainlink-aptos
        uses: actions/checkout@44c2b7a8a4ea60a981eaca3cf939b5f4305c123b # v4.1.5

      - name: Checkout chainlink
        uses: actions/checkout@44c2b7a8a4ea60a981eaca3cf939b5f4305c123b # v4.1.5
        with:
          repository: smartcontractkit/chainlink
          ref: ${{ env.CUSTOM_CORE_REF || env.DEFAULT_CORE_REF }}
          path: temp/chainlink

      - name: Read go version from core .tool-versions
        id: tool_versions
        run: |
          go_version=$(grep -E '^golang ' temp/chainlink/.tool-versions | cut -d' ' -f2)
          echo "GO_VERSION=${go_version}" >> "${GITHUB_OUTPUT}"

      - name: Set up Go
        uses: actions/setup-go@cdcb36043654635271a94b9a6d1392de5bb323a7 # v5.0.1
        with:
          go-version: ${{ steps.tool_versions.outputs.GO_VERSION }}

      - name: Update chainlink-aptos sha
        env:
          COMMIT_SHA: ${{ github.event_name == 'push' && github.sha || github.event.pull_request.head.sha }}
        run: |
          cd temp/chainlink
          find . -name "go.mod" -exec sed -i -E "/.*\/chainlink-aptos \S+/ s/(.*\/chainlink-aptos) \S+/\1 ${COMMIT_SHA}/g" {} \;
          GIT_PAGER= git diff
          make gomodtidy

      - name: Build LOOP plugin
        run: |
          go build -o chainlink-aptos ./cmd/chainlink-aptos/main.go

      - name: Start PostgreSQL
        run: |
          docker run -d \
            --name postgres \
            -p 5432:5432 \
            -e POSTGRES_USER=postgres \
            -e POSTGRES_PASSWORD=postgres \
            -e POSTGRES_DB=postgres \
            postgres:15.2-alpine

      - name: Prepare database
        env:
          CL_DATABASE_URL: 'postgresql://postgres:postgres@localhost:5432/chainlink_test?sslmode=disable'
        run: |
          cd temp/chainlink
          make testdb

      - name: Run Test
        env:
          CL_DATABASE_URL: 'postgresql://postgres:postgres@localhost:5432/chainlink_test?sslmode=disable'
          CL_APTOS_CMD: ${{ github.workspace }}/chainlink-aptos
        run: |
          cd temp/chainlink/integration-tests/smoke/ccip
          go test -v -tags=integration -count=1 -timeout=30m -run Test_CCIP_Messaging_EVM2Aptos ./...

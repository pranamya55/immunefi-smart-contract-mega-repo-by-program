name: Aptos - Contracts

on:
  push:
    branches:
      - develop
      - main
  pull_request:

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
    - name: Check out code
      uses: actions/checkout@v4

    - name: Install Aptos CLI
      uses: aptos-labs/actions/install-aptos-cli@ce57287eb852b9819c1d74fecc3be187677559fd # v0.1
      with:
        CLI_VERSION: 8.1.0

    - name: Run tests
      run: make move-test
